<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kirish — HikCentral Monitor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #1a5276; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,.25); }
    .login-logo { font-size: 2.5rem; color: #1a5276; margin-bottom: .5rem; }
    .login-title { font-weight: 700; color: #1a5276; margin-bottom: .25rem; }
    .login-sub { color: #6c757d; font-size: .85rem; margin-bottom: 1.5rem; }
    .btn-login { background: #1a5276; border: none; padding: .65rem; font-weight: 600; }
    .btn-login:hover { background: #154360; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <i class="bi bi-camera-video-fill login-logo"></i>
    <div class="login-title">HikCentral Monitor</div>
    <div class="login-sub">Kamera monitoringi tizimi</div>

    {% if error %}
    <div class="alert alert-danger py-2" style="font-size:.85rem;">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3 text-start">
        <label class="form-label fw-semibold" style="font-size:.85rem;">Login</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
        </div>
      </div>
      <div class="mb-4 text-start">
        <label class="form-label fw-semibold" style="font-size:.85rem;">Parol</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-login btn-primary w-100 text-white">
        <i class="bi bi-box-arrow-in-right me-1"></i> Kirish
      </button>
    </form>
  </div>
</body>
</html>
