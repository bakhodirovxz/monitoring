<VirtualHost *:80>
    ServerAdmin webmaster@example.com
    ServerName monitoring.static.uz

    IncludeOptional /www/server/panel/vhost/apache/extension/monitoring.static.uz/*.conf
    ErrorLog  "/www/wwwlogs/monitoring.static.uz-error_log"
    CustomLog "/www/wwwlogs/monitoring.static.uz-access_log" combined

    # HTTP → HTTPS redirect
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerAdmin webmaster@example.com
    ServerName monitoring.static.uz

    IncludeOptional /www/server/panel/vhost/apache/extension/monitoring.static.uz/*.conf
    ErrorLog  "/www/wwwlogs/monitoring.static.uz-error_log"
    CustomLog "/www/wwwlogs/monitoring.static.uz-access_log" combined

    SSLEngine On
    SSLCertificateFile    /www/server/panel/vhost/cert/monitoring.static.uz/fullchain.pem
    SSLCertificateKeyFile /www/server/panel/vhost/cert/monitoring.static.uz/privkey.pem
    SSLCipherSuite EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5:ALL:!ADH:!EXPORT56:+HIGH:+MEDIUM:+LOW
    SSLProtocol All -SSLv2 -SSLv3 -TLSv1
    SSLHonorCipherOrder On

    # 1C API PROXY
    ProxyRequests Off
    <Location /1c/>
        ProxyPass        http://10.0.90.52/con2026/hs/aiassistant/
        ProxyPassReverse http://10.0.90.52/con2026/hs/aiassistant/
        RequestHeader set Authorization "Basic QUlhc3Npc3RhbnQ6QUlhc3Npc3RhbnRHaWRybzg4Kw=="
        Header always set Access-Control-Allow-Origin  "*"
        Header always set Access-Control-Allow-Methods "POST, OPTIONS"
        Header always set Access-Control-Allow-Headers "Content-Type"
    </Location>

    # WebSocket support
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:8000/$1 [P,L]

    # FastAPI (Uvicorn) — barcha qolgan so'rovlar
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Muhim fayllarni himoyalash
    <LocationMatch "^/(hcp\.db|\.env|\.git|schema\.sql|requirements\.txt|README\.md|seed\.py|poller\.py)$">
        Require all denied
    </LocationMatch>
</VirtualHost>
